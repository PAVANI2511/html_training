<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <h1><strong>Heading 1</strong></h1>
    <h2><b>Heading 2</b></h2>
    <h3><i>Heading 3</i></h3>
    <h4><em>Heading 4</em></h4>
    <h5><u>Heading 5</u></h5>
    <h6><mark>Heading 6</mark></h6>
    <a href="https://www.w3schools.com/html/default.asp" target="_blank">Learn HTML</a>
    <img src="https://www.w3schools.com/images/w3schools_green.jpg" alt="W3Schools.com">
    <h3>ordered list</h3>
    <ol>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ol>
    <h3>unordered list</h3>
    <ul>
        <li>First item</li>
        <li>Second item</li>
        <li>Third item</li>
    </ul>
    <table border="1">
        <tr>
            <th>Firstname</th>
            <th>Lastname</th>
            <th>Age</th>
        </tr>
        <tr>
            <td>Jill</td>
            <td>Smith</td>
            <td>50</td>
        </tr>
        <tr>
            <td>Eve</td>
            <td>Jackson</td>
            <td>94</td>
    </table>
    <form>
        <label>First name:</label><br>
        <input type="text"><br>
        <label>Last name:</label><br>
        <input type="text"><br> 
        <button type="submit">Submit</button>
    </form>
</body>
</html>
